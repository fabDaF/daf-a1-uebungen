    :root {
      --a11-color: #D4A574;
      --a11-dark:  #B8895E;
      --a11-light: #F5E6D3;
      --a12-color: #667eea;
      --a12-dark:  #4a5fd4;
      --a12-light: #e8ecff;
      --a21-color: #27ae60;
      --a21-dark:  #1e8449;
      --a21-light: #d5f5e3;
      --text-dark: #1a1a2e;
      --bg: #f4f6fb;
      --shadow: 0 2px 10px rgba(0,0,0,0.10);
      --shadow-hover: 0 6px 20px rgba(0,0,0,0.15);
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5e 100%);
      color: #fff;
      padding: 2rem;
      text-align: center;
    }
    .header h1 { font-size: 2rem; margin-bottom: 0.3rem; letter-spacing: 1px; }
    .header p  { opacity: 0.8; font-size: 1rem; }

    /* ── CONTAINER ── */
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 3rem; }

    /* ── NIVEAU-BLOCK ── */
    .niveau { margin-bottom: 1.2rem; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }

    .niveau-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      user-select: none;
      transition: filter 0.2s;
    }
    .niveau-header:hover { filter: brightness(1.07); }

    .niveau-header .chevron {
      margin-left: auto;
      font-size: 1.1rem;
      transition: transform 0.25s;
    }
    .niveau.open > .niveau-header .chevron { transform: rotate(180deg); }

    .niveau-badge {
      font-size: 1.1rem; font-weight: 800;
      background: rgba(255,255,255,0.25);
      padding: 4px 14px; border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .niveau-title { font-size: 1.15rem; font-weight: 700; }
    .niveau-count { font-size: 0.85rem; opacity: 0.85; }

    /* Farben pro Niveau */
    .niveau-a11 > .niveau-header { background: linear-gradient(135deg, var(--a11-color), var(--a11-dark)); color: #3a2010; }
    .niveau-a12 > .niveau-header { background: linear-gradient(135deg, var(--a12-color), var(--a12-dark)); color: #fff; }
    .niveau-a21 > .niveau-header { background: linear-gradient(135deg, var(--a21-color), var(--a21-dark)); color: #fff; }

    /* ── NIVEAU-BODY ── */
    .niveau-body { display: none; background: #fff; padding: 0.8rem 1rem; }
    .niveau.open > .niveau-body { display: block; }

    /* ── EINHEIT-BLOCK ── */
    .einheit { margin-bottom: 0.6rem; border: 1px solid #e0e4ef; border-radius: 10px; overflow: hidden; }

    .einheit-header {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      background: #f7f8ff;
      transition: background 0.15s;
    }
    .einheit-header:hover { background: #edf0ff; }
    .niveau-a11 .einheit-header:hover { background: var(--a11-light); }
    .niveau-a12 .einheit-header:hover { background: var(--a12-light); }
    .niveau-a21 .einheit-header:hover { background: var(--a21-light); }

    .einheit-header .chevron {
      margin-left: auto; font-size: 0.95rem;
      transition: transform 0.2s;
    }
    .einheit.open > .einheit-header .chevron { transform: rotate(180deg); }

    .einheit-nr {
      font-weight: 700; font-size: 0.82rem;
      padding: 2px 10px; border-radius: 12px;
      background: rgba(0,0,0,0.07);
    }
    .einheit-titel { font-weight: 600; font-size: 0.95rem; }

    .einheit-senden {
      margin-left: 0.5rem;
      padding: 3px 12px;
      border: none; border-radius: 14px;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .einheit-senden:hover { opacity: 0.8; }
    .niveau-a11 .einheit-senden { background: var(--a11-color); color: #3a2010; }
    .niveau-a12 .einheit-senden { background: var(--a12-color); color: #fff; }
    .niveau-a21 .einheit-senden { background: var(--a21-color); color: #fff; }

    /* ── EINHEIT-BODY ── */
    .einheit-body { display: none; background: #fff; }
    .einheit.open > .einheit-body { display: block; }

    /* ── KARTEN ── */
    .karten-liste { display: flex; flex-direction: column; gap: 0; }

    .karte {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-top: 1px solid #f0f2f8;
      transition: background 0.15s;
    }
    .karte:hover { background: #f9faff; }
    .niveau-a11 .karte:hover { background: #fdf6ee; }
    .niveau-a21 .karte:hover { background: #eafaf1; }

    .karte-typ {
      font-size: 0.70rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
      min-width: 85px; text-align: center;
    }
    .typ-v  { background: #e8f5e9; color: #2e7d32; }
    .typ-g  { background: #e3f2fd; color: #1565c0; }
    .typ-x  { background: #fff3e0; color: #e65100; }
    .typ-c  { background: #fce4ec; color: #c62828; }
    .typ-r  { background: #f3e5f5; color: #6a1b9a; }
    .typ-w  { background: #e0f7fa; color: #00695c; }
    .typ-s  { background: #fff8e1; color: #f57f17; }
    .typ-x2 { background: #ede7f6; color: #4527a0; }

    .karte-titel { flex: 1; font-size: 0.90rem; }

    .karte-actions { display: flex; gap: 0.5rem; margin-left: auto; flex-shrink: 0; }

    .btn-oeffnen {
      padding: 4px 14px;
      border-radius: 14px; border: none;
      font-size: 0.78rem; font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-oeffnen:hover { opacity: 0.8; }
    .niveau-a11 .btn-oeffnen { background: var(--a11-color); color: #3a2010; }
    .niveau-a12 .btn-oeffnen { background: var(--a12-color); color: #fff; }
    .niveau-a21 .btn-oeffnen { background: var(--a21-color); color: #fff; }

    .btn-senden {
      padding: 4px 12px;
      border-radius: 14px;
      border: 1.5px solid #ccc;
      background: #fff;
      font-size: 0.78rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-senden:hover { background: #f0f0f0; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      padding: 2rem; max-width: 500px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .modal-info { font-size: 0.88rem; color: #555; margin-bottom: 1.2rem; line-height: 1.6; }
    .modal-links { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .modal-link {
      padding: 0.5rem 0.8rem; background: #f4f6fb;
      border-radius: 8px; font-size: 0.85rem;
      font-family: monospace; word-break: break-all;
    }
    .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
    .modal-copy {
      padding: 8px 20px; border-radius: 20px;
      border: none; background: #667eea; color: #fff;
      font-weight: 700; cursor: pointer; font-size: 0.9rem;
    }
    .modal-copy:hover { background: #4a5fd4; }
    .modal-close {
      padding: 8px 20px; border-radius: 20px;
      border: 1.5px solid #ccc; background: #fff;
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
    }
    .modal-close:hover { background: #f0f0f0; }

    /* ── FOOTER ── */
    .footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #999; }
  </style>
</head>

// ═══════════════════════════════════════════════════════
//  TYP → CSS-KLASSE
// ═══════════════════════════════════════════════════════
const TYP_CSS = { V:'typ-v', G:'typ-g', X:'typ-x', C:'typ-c', R:'typ-r', W:'typ-w', S:'typ-s' };

// ═══════════════════════════════════════════════════════
//  RENDERN
// ═══════════════════════════════════════════════════════
function render() {
  const main = document.getElementById('main');
  KURSE.forEach(kurs => {
    const nDiv = document.createElement('div');
    nDiv.className = `niveau niveau-${kurs.id}`;
    nDiv.id = `niveau-${kurs.id}`;

    const einheitCount = kurs.einheiten.length;
    const kartenCount  = kurs.einheiten.reduce((s,e) => s + e.karten.length, 0);

    nDiv.innerHTML = `
      <div class="niveau-header" onclick="toggleNiveau('${kurs.id}')">
        <span class="niveau-badge">${kurs.label}</span>
        <span class="niveau-title">${kurs.titel}</span>
        <span class="niveau-count">${einheitCount} Einheiten · ${kartenCount} Dateien</span>
        <span class="chevron">▼</span>
      </div>
      <div class="niveau-body" id="body-${kurs.id}"></div>
    `;
    main.appendChild(nDiv);

    const body = document.getElementById(`body-${kurs.id}`);
    kurs.einheiten.forEach((einheit, ei) => {
      const eId = `e-${kurs.id}-${ei}`;
      const sendFiles = einheit.karten.map(k => k.file);
      const sendLabel = `${einheit.nr} – ${einheit.titel}`;

      const eDiv = document.createElement('div');
      eDiv.className = 'einheit';
      eDiv.id = eId;

      const kartenHTML = einheit.karten.map(k => `
        <div class="karte">
          <span class="karte-typ ${TYP_CSS[k.typ] || 'typ-v'}">${k.label}</span>
          <span class="karte-titel">${k.titel}</span>
          <div class="karte-actions">
            <a class="btn-oeffnen" href="${kurs.basis}${k.file}" target="_blank">Öffnen</a>
            <button class="btn-senden" onclick="zeigeModal('${k.titel.replace(/'/g,"\\'")}','${kurs.basis}${k.file}')">✉</button>
          </div>
        </div>
      `).join('');

      eDiv.innerHTML = `
        <div class="einheit-header" onclick="toggleEinheit('${eId}')">
          <span class="einheit-nr">${einheit.nr}</span>
          <span class="einheit-titel">${einheit.titel}</span>
          <button class="einheit-senden" onclick="event.stopPropagation(); zeigeModalListe('${sendLabel}', ${JSON.stringify(sendFiles.map(f => kurs.basis+f))})">✉ Einheit senden</button>
          <span class="chevron">▼</span>
        </div>
        <div class="einheit-body">
          <div class="karten-liste">${kartenHTML}</div>
        </div>
      `;
      body.appendChild(eDiv);
    });
  });
}

// ═══════════════════════════════════════════════════════
//  TOGGLE
// ═══════════════════════════════════════════════════════
function toggleNiveau(id) {
  document.getElementById(`niveau-${id}`).classList.toggle('open');
}
function toggleEinheit(id) {
  document.getElementById(id).classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════
let _modalLinks = [];

function zeigeModal(titel, url) {
  _modalLinks = [url];
  document.getElementById('modal-titel').textContent = titel;
  const linksDiv = document.getElementById('modal-links');
  linksDiv.innerHTML = `<div class="modal-link">${url}</div>`;
  document.getElementById('modal').classList.add('open');
}

function zeigeModalListe(titel, urls) {
  _modalLinks = urls;
  document.getElementById('modal-titel').textContent = titel;
  const linksDiv = document.getElementById('modal-links');
  linksDiv.innerHTML = urls.map(u => `<div class="modal-link">${u}</div>`).join('');
  document.getElementById('modal').classList.add('open');
}

function schliesseModal() {
  document.getElementById('modal').classList.remove('open');
}

function kopiereLinks() {
  navigator.clipboard.writeText(_modalLinks.join('\n')).then(() => {
    const btn = document.querySelector('.modal-copy');
    btn.textContent = '✓ Kopiert!';
    setTimeout(() => btn.textContent = '📋 Kopieren', 1500);
  });
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) schliesseModal();
});

// ═══════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════
render();
</script>
